name: 🚲 抓取交通資料（YouBike + AQI）

on:
  schedule:
    # 每 30 分鐘執行一次（UTC 時間）
    - cron: '*/30 * * * *'
  # 允許手動觸發（測試用）
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安裝依賴套件
        run: pip install requests

      - name: 🚲 抓取 YouBike 資料
        run: python scripts/fetch_youbike.py

      - name: 💨 抓取 AQI 空氣品質資料
        run: python scripts/fetch_air_quality.py

      - name: 📝 Commit 更新資料
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/transport/
          # 只有資料有變動才 commit
          if git diff --staged --quiet; then
            echo "✅ 資料無變動，跳過 commit"
          else
            git commit -m "🔄 自動更新：交通資料 $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push
          fi
