name: 🚲 抓取交通資料（YouBike + AQI）

on:
  schedule:
    # 每天台灣時間 07:00 到 20:00 (UTC 23, 0~12) 每小時執行一次
    - cron: '0 23,0-12 * * *'
  # 允許手動觸發（測試用）
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安裝依賴套件
        run: pip install requests

      # 暫停 YouBike 抓取 (因本月 TDX API 額度已達上限)
      # - name: 🚲 抓取 YouBike 資料
      #   run: python scripts/fetch_youbike.py
      #   continue-on-error: true
      #   env:
      #     TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
      #     TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}

      - name: 💨 抓取 AQI 空氣品質資料
        run: python scripts/fetch_air_quality.py
        continue-on-error: true
        env:
          MOENV_API_KEY: ${{ secrets.MOENV_API_KEY }}

      - name: 📝 Commit 更新資料
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/transport/
          # 只有資料有變動才 commit
          if git diff --staged --quiet; then
            echo "✅ 資料無變動，跳過 commit"
          else
            git commit -m "🔄 自動更新：交通資料 $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push
          fi
