name: 💰 抓取財經資料（股市 + 匯率 + 加密貨幣）

on:
  schedule:
    # 每週一至週五 16:30 台灣時間（UTC 08:30）
    - cron: '30 8 * * 1-5'
  # 允許手動觸發（測試用）
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安裝依賴套件
        run: pip install requests

      - name: 📈 抓取台灣加權指數
        run: python scripts/fetch_stock.py

      - name: 💱 抓取台灣銀行匯率
        run: python scripts/fetch_exchange_rate.py

      - name: 🪙 抓取加密貨幣 Top 10
        run: python scripts/fetch_crypto.py

      - name: 📝 Commit 更新資料
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/finance/
          if git diff --staged --quiet; then
            echo "✅ 資料無變動，跳過 commit"
          else
            git commit -m "💰 自動更新：財經資料 $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push
          fi
